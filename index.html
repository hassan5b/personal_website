const THEME_KEY = "hb-theme";

function getTheme() {
  return localStorage.getItem(THEME_KEY) || "dark";
}

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  const btn = document.getElementById("theme-toggle");

  if (btn) {
    btn.innerHTML = theme === "dark"
      ? '<i class="fa-solid fa-sun" aria-hidden="true"></i>'
      : '<i class="fa-solid fa-moon" aria-hidden="true"></i>';
    btn.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
  }

  localStorage.setItem(THEME_KEY, theme);
}

function toggleTheme() {
  const current = getTheme();
  applyTheme(current === "dark" ? "light" : "dark");
}

applyTheme(getTheme());

function byId(id) {
  return document.getElementById(id);
}

function isMobileViewport() {
  return window.matchMedia("(max-width: 640px)").matches;
}

function ensureMobileSubnavContainer() {
  const main = byId("main-content");
  if (!main || byId("mobile-subnav")) {
    return;
  }

  const mobileSubnav = document.createElement("div");
  mobileSubnav.id = "mobile-subnav";
  mobileSubnav.className = "mobile-subnav";
  mobileSubnav.setAttribute("aria-label", "Section navigation");
  main.insertBefore(mobileSubnav, main.firstChild);
}

function getActiveSubnavContainer() {
  if (isMobileViewport()) {
    return byId("mobile-subnav");
  }
  return byId("sidebar-subnav");
}

function esc(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function slugifyId(value) {
  return String(value)
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

  if (meta) {
    meta.setAttribute("content", DATA.metaDescription);
  }
  byId("topbar-name").textContent = DATA.name;
}

  }).join("");

  byId("social-links").innerHTML = socialMarkup;

    "under-review": { label: "Under Review", className: "review" },
    published: { label: "Published", className: "published" }

  return map[status] || { label: status, className: "published" };
}

function renderProjectLinks(project) {
  const links = [];

  if (project.driveUrl) {
    links.push(`<a class="project-link" href="${esc(project.driveUrl)}" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-folder-open" aria-hidden="true"></i><span>Drive</span></a>`);
  }

  if (project.githubUrl) {
    links.push(`<a class="project-link" href="${esc(project.githubUrl)}" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-github" aria-hidden="true"></i><span>GitHub</span></a>`);
  }

  if (!links.length) {
    return `<span class="project-link placeholder-btn"><i class="fa-regular fa-clock" aria-hidden="true"></i><span>Materials coming soon</span></span>`;
  }

  return links.join("");
}

        <h3>${esc(project.name)}</h3>
        <p class="project-subtitle"><em>${esc(project.subtitle)}</em></p>

        <div class="tag-wrap">${tags}</div>
        <div class="project-links">${renderProjectLinks(project)}</div>

  panel.innerHTML = `

    <hr class="section-divider">

function clearSectionObserver() {
  if (STATE.sectionObserver) {
    STATE.sectionObserver.disconnect();
    STATE.sectionObserver = null;
  }

  if (STATE.sectionScrollHandler) {
    const root = byId("main-content");
    if (root) {
      root.removeEventListener("scroll", STATE.sectionScrollHandler);
    }
    STATE.sectionScrollHandler = null;
  }
}

function setupSectionObserver(targetIds) {
  clearSectionObserver();

  const root = byId("main-content");
  const targets = targetIds.map((id) => byId(id)).filter(Boolean);

  if (!targets.length) {
    return;
  }

  const visibility = new Map();
  const activationOffset = isMobileViewport() ? 180 : 120;

  const updateActiveByScrollPosition = () => {
    let fallbackId = targetIds[0];
    const rootTop = root.getBoundingClientRect().top;

    targetIds.forEach((id) => {
      const el = byId(id);
      if (!el) {
        return;
      }
      if (el.getBoundingClientRect().top - rootTop <= activationOffset) {
        fallbackId = id;
      }
    });

    setSubnavActive(fallbackId);
  };

  STATE.sectionObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        visibility.set(entry.target.id, entry.intersectionRatio);
      } else {
        visibility.delete(entry.target.id);
      }
    });

    if (visibility.size > 0) {
      const activeId = Array.from(visibility.entries()).sort((a, b) => b[1] - a[1])[0][0];
      setSubnavActive(activeId);
      return;
    }

    updateActiveByScrollPosition();
  }, {
    root,
    threshold: [0.12, 0.35, 0.6],
    rootMargin: isMobileViewport() ? "-50px 0px -55% 0px" : "-8% 0px -60% 0px"
  });

  targets.forEach((el) => STATE.sectionObserver.observe(el));

  let ticking = false;
  STATE.sectionScrollHandler = () => {
    if (ticking) {
      return;
    }
    ticking = true;
    requestAnimationFrame(() => {
      updateActiveByScrollPosition();
      ticking = false;
    });
  };

  root.addEventListener("scroll", STATE.sectionScrollHandler, { passive: true });
  updateActiveByScrollPosition();
}

function scrollToTarget(id) {
  const target = byId(id);
  if (!target) {
    return;
  }

  target.scrollIntoView({ behavior: "smooth", block: "start" });
  setSubnavActive(id);
}

function updateSidebarNav(tabId) {
  const title = byId("subnav-title");
  const container = getActiveSubnavContainer();

  if (!container) {
    return;
  }

  if (tabId === "projects") {
    title.textContent = "Projects";

    container.innerHTML = `
      <ul class="subnav-list">
        ${DATA.projects.map((project) => `<li><button type="button" class="nav-link subnav-btn" data-target="${esc(project.id)}">${esc(project.name)}</button></li>`).join("")}
      </ul>
    `;

    setSubnavActive(DATA.projects[0].id);
    setupSectionObserver(DATA.projects.map((project) => project.id));
    return;
  }

  if (tabId === "publications") {
    title.textContent = "Publications";

    container.innerHTML = `
      <ul class="subnav-list">
        <li><button type="button" class="nav-link subnav-btn" data-filter="all">All</button></li>
        <li><button type="button" class="nav-link subnav-btn" data-filter="accepted">Accepted</button></li>
        <li><button type="button" class="nav-link subnav-btn" data-filter="under-review">Under Review</button></li>
      </ul>
    `;

    clearSectionObserver();
    syncPublicationFilterButtons();
    return;
  }

  title.textContent = "Timeline";
  container.innerHTML = `
    <ul class="subnav-list">
      ${DATA.timeline.map((item) => `<li><button type="button" class="nav-link subnav-btn" data-target="${esc(slugifyId(item.id))}">${esc(item.title)}</button></li>`).join("")}
    </ul>
  `;

  setSubnavActive(slugifyId(DATA.timeline[0].id));
  setupSectionObserver(DATA.timeline.map((item) => slugifyId(item.id)));
}

function switchTab(tabId, resetScroll) {
  STATE.activeTab = tabId;

  setActiveTabButton(tabId);
  setActivePanel(tabId);
  updateSidebarNav(tabId);

  if (resetScroll) {
    byId("main-content").scrollTop = 0;
  }

  if (tabId === "publications") {
    filterPublications(STATE.publicationFilter);
  }
}

function bindHandlers() {
  const handleSubnavClick = (event) => {
    const button = event.target.closest(".nav-link");
    if (!button) {
      return;
    }

    if (button.dataset.filter) {
      filterPublications(button.dataset.filter);
      return;
    }

    if (button.dataset.target) {
      scrollToTarget(button.dataset.target);
    }
  };

  byId("tab-nav").addEventListener("click", (event) => {
    const button = event.target.closest(".tab-btn");
    if (!button) {
      return;
    }
    switchTab(button.dataset.tab, true);
  });

  const sidebarSubnav = byId("sidebar-subnav");
  if (sidebarSubnav) {
    sidebarSubnav.addEventListener("click", handleSubnavClick);
  }

  const mobileSubnav = byId("mobile-subnav");
  if (mobileSubnav) {
    mobileSubnav.addEventListener("click", handleSubnavClick);
  }

  byId("panel-publications").addEventListener("click", (event) => {
    const button = event.target.closest(".abstract-toggle");
    if (!button) {
      return;
    }

    const body = button.nextElementSibling;
    if (!body) {
      return;
    }

    const open = body.classList.toggle("open");
    button.textContent = open ? "Hide abstract" : "Show abstract";
    button.setAttribute("aria-expanded", String(open));
  });

  let previousMobileState = isMobileViewport();
  window.addEventListener("resize", () => {
    const currentMobileState = isMobileViewport();
    if (currentMobileState === previousMobileState) {
      return;
    }

    previousMobileState = currentMobileState;
    updateSidebarNav(STATE.activeTab);
  });
}

function render() {
  setDocumentMeta();
  renderTopTabs();
  renderSidebarProfile();
  ensureMobileSubnavContainer();
  renderPanels();
  bindHandlers();
  switchTab("projects", false);
}

document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
